<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#08050f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>REIN SLOTS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="brand">REIN <span class="brand-sub">SLOTS</span></span>
    <div class="top-bal">
      <span class="bal-label">COINS</span>
      <span id="balance">1,000</span>
    </div>
  </div>

  <div id="grid-wrap">
    <div id="grid"></div>
  </div>

  <div id="win-banner" class="hidden">
    <div id="wb-amount">+0</div>
    <div id="wb-detail"></div>
  </div>

  <div id="controls">
    <div class="bet-row">
      <button class="bet-adj" id="betDown">−</button>
      <div class="bet-display">
        <div class="bet-lbl">BET</div>
        <div id="betVal">10</div>
      </div>
      <button class="bet-adj" id="betUp">+</button>
    </div>
    <button id="spinBtn" class="spin-btn">S P I N</button>
  </div>

  <div id="win-lines"></div>

  <details id="paytable" open>
    <summary>PAYTABLE ▾</summary>
    <div id="pt-grid"></div>
  </details>

  <div id="history-wrap">
    <div class="hist-label">HISTORY</div>
    <div id="history"></div>
  </div>

  <div style="height:env(safe-area-inset-bottom,16px)"></div>
</div>
<script src="js/slot.js"></script>
<script src="js/main.js"></script>
</body>
</html>
