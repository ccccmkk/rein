<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REIN — Traffic Fine Simulation</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/controls/OrbitControls.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div class="brand">
        <div class="brand-title">REIN</div>
        <div class="brand-sub">Traffic Fine Simulation</div>
      </div>

      <div class="section">
        <div class="controls">
          <button id="btnStart">&#9654; Start</button>
          <button id="btnPause" disabled>&#9646;&#9646; Pause</button>
          <button id="btnReset">&#8635; Reset</button>
        </div>
      </div>

      <div class="section">
        <div class="slider-row">
          <label>Speed <span id="lblSpeed">1&#215;</span></label>
          <input type="range" id="sldSpeed" min="1" max="10" value="1">
        </div>
        <div class="slider-row">
          <label>&#x1F697; Cars <span id="lblCars">20</span></label>
          <input type="range" id="sldCars" min="5" max="60" value="20">
        </div>
        <div class="slider-row">
          <label>&#x1F46E; Police <span id="lblPolice">3</span></label>
          <input type="range" id="sldPolice" min="1" max="10" value="3">
        </div>
      </div>

      <div class="section">
        <div class="section-title">&#x1F6A8; 단속 현황</div>
        <div class="stat"><span>총 단속 건수</span><span id="sTotalFines">0건</span></div>
        <div class="stat"><span>총 징수 벌금</span><span id="sFineAmount">0원</span></div>
        <div class="stat"><span>과속 단속</span><span id="sSpeedFines">0건</span></div>
        <div class="stat"><span>신호위반 단속</span><span id="sRedFines">0건</span></div>
        <div class="stat"><span>경찰 단속수</span><span id="sPolFines">0건</span></div>
      </div>

      <div class="section">
        <div class="section-title">&#x1F4CA; 실시간 현황</div>
        <div class="stat"><span>시민 평균 재산</span><span id="sAvgMoney">0원</span></div>
        <div class="stat"><span>과속 중</span><span id="sSpeeders">0/0</span></div>
        <div class="stat"><span>신호위반 중</span><span id="sRedNow">0/0</span></div>
      </div>

      <div class="section">
        <div class="section-title">CAMERA</div>
        <div class="hint">Left drag &mdash; rotate</div>
        <div class="hint">Right drag &mdash; pan</div>
        <div class="hint">Scroll &mdash; zoom</div>
      </div>

      <div class="section">
        <div class="section-title">LEGEND</div>
        <div class="legend-item"><i class="dot" style="background:#0044cc"></i>경찰차</div>
        <div class="legend-item"><i class="dot" style="background:#ff4400"></i>과속 차량</div>
        <div class="legend-item"><i class="dot" style="background:#ff0000"></i>신호위반 차량</div>
        <div class="legend-item"><i class="dot" style="background:#00ff44"></i>신호 (Green)</div>
        <div class="legend-item"><i class="dot" style="background:#ff2200"></i>신호 (Red)</div>
      </div>
    </div>

    <div id="view"></div>
  </div>

  <script src="js/road.js"></script>
  <script src="js/car.js"></script>
  <script src="js/simulation.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
