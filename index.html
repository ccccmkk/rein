<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#08050f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>REIN SLOTS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="brand-wrap">
      <span class="brand">REIN <span class="brand-sub">SLOTS</span></span>
      <span id="player-nick" class="player-nick"></span>
    </div>
    <div class="top-bal">
      <span class="bal-label">COINS</span>
      <span id="balance">1,000</span>
    </div>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button id="tab-slot" class="tab-btn active">S L O T</button>
    <button id="tab-shop" class="tab-btn">S H O P</button>
    <button id="tab-upg"  class="tab-btn">U P G</button>
    <button id="tab-rank" class="tab-btn">R A N K</button>
  </div>

  <!-- SLOT VIEW -->
  <div id="slot-view">
    <div id="grid-area">
      <div id="grid-wrap">
        <div id="grid"></div>
      </div>
      <div id="lever-wrap">
        <div id="lever">
          <div id="lever-base"></div>
          <div id="lever-rod"></div>
          <div id="lever-knob"></div>
        </div>
      </div>
    </div>
    <div id="grid-size-sel"></div>

    <div id="win-banner" class="hidden">
      <div id="wb-amount">+0</div>
      <div id="wb-detail"></div>
    </div>

    <!-- Consumable inventory bar -->
    <div id="con-bar-wrap">
      <div id="con-bar"></div>
    </div>

    <div id="controls">
      <div id="spin-counter" class="spin-counter"></div>
      <button id="mult-btn" class="mult-btn">배율표</button>
    </div>

    <div id="win-lines"></div>

    <details id="paytable">
      <summary>심볼 목록 ▾</summary>
      <div id="pt-grid"></div>
    </details>

    <div id="history-wrap">
      <div class="hist-label">HISTORY</div>
      <div id="history"></div>
    </div>
  </div>

  <!-- SHOP VIEW -->
  <div id="shop-view" class="hidden">
    <div id="shop-content"></div>
  </div>

  <!-- UPGRADE VIEW -->
  <div id="upg-view" class="hidden">
    <div id="upg-content"></div>
  </div>

  <!-- RANK VIEW -->
  <div id="rank-view" class="hidden">
    <div id="rank-content"></div>
  </div>

  <div style="height:env(safe-area-inset-bottom,16px)"></div>
</div>

<!-- Multiplier Modal -->
<div id="mult-modal" class="hidden">
  <div id="mult-card">
    <div class="mult-modal-title">배율표</div>
    <div id="mult-lines-section">
      <div class="mult-section-hd">📐 매치 배율</div>
      <div id="mult-match-table"></div>
    </div>
    <div id="mult-sym-section">
      <div class="mult-section-hd">🎰 심볼 가치 (val)</div>
      <div id="mult-sym-table"></div>
    </div>
    <button id="mult-close">닫기</button>
  </div>
</div>

<!-- Nickname Modal -->
<div id="nick-modal">
  <div id="nick-card">
    <div id="nick-title">🎰 REIN SLOTS</div>
    <div id="nick-sub">닉네임을 입력하세요</div>
    <input id="nick-input" type="text" maxlength="12" placeholder="닉네임 (최대 12자)">
    <button id="nick-ok">시작!</button>
  </div>
</div>

<!-- Unlock Popup -->
<div id="unlock-popup" class="hidden">
  <div id="unlock-card">
    <div id="up-emoji">🎉</div>
    <div id="up-name">해금!</div>
    <div id="up-desc"></div>
    <button id="up-close">확인</button>
  </div>
</div>

<!-- Milestone Perk Modal -->
<div id="milestone-modal" class="hidden">
  <div id="milestone-card">
    <div id="ms-title">🎯 MILESTONE!</div>
    <div id="ms-sub"></div>
    <div id="ms-perks"></div>
  </div>
</div>

<!-- Effect Toast -->
<div id="effect-toast" class="hidden"></div>

<script src="js/db.js?v=23"></script>
<script src="js/slot.js?v=23"></script>
<script src="js/main.js?v=23"></script>
<script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/rein/sw.js').then(reg=>{
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='activated') location.reload();
        });
      });
    });
  }
</script>
</body>
</html>
